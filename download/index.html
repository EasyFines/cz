<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyFines – Přesměrování...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script>
    // URL links
    const appStoreUrl = "https://apps.apple.com/app/apple-store/id6765952002?pt=128712125&ct=campaign&mt=8";
    const googlePlayUrl = "https://play.google.com/store/apps/details?id=com.sagittariusinvestment.easyfines&utm_source=campaign&utm_medium=smartlink&utm_campaign=download";

    function redirect() {
      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      // iOS detection
      if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
        window.location.href = appStoreUrl;
        return;
      }

      // Android detection
      if (/android/i.test(userAgent)) {
        window.location.href = googlePlayUrl;
        return;
      }
      
      // If we are here, display the page contents (desktop/other)
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'flex';
    }

    // Run redirection as fast as possible
    window.onload = redirect;
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #081a0f;
      --green-accent: #1db954;
      --green-bright: #2ecc71;
      --white: #ffffff;
      --grey: #a0b0a8;
      --font-body: 'Outfit', sans-serif;
    }
    body {
      background: var(--green-dark);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* BG Glows */
    .bg-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(29,185,84,0.15), transparent 70%);
      filter: blur(60px);
      border-radius: 50%;
      z-index: 1;
    }
    
    #loading {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--grey);
      z-index: 2;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    #content {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      z-index: 2;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(29,185,84,0.25);
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    h1 span {
      color: var(--green-accent);
    }
    p {
      color: var(--grey);
      font-size: 1rem;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }
    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-store:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .btn-appstore {
      background: #fff;
      color: #000;
    }
    .btn-googleplay {
      background: var(--green-accent);
      color: #000;
    }
    .btn-store svg {
      width: 24px;
      height: 24px;
    }
    .btn-store-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }
    .btn-store-text small {
      font-size: 0.7rem;
      font-weight: 400;
      opacity: 0.8;
    }
    .btn-store-text strong {
      font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div id="loading">Přesměrovávám do obchodu s aplikacemi...</div>

  <div id="content">
    <img class="logo" src="https://7da1a58e4c.cbaul-cdnwnd.com/c9eec3ee3a55aa27beb963b0f82210c3/200000064-3343433436/Icona_rounded.png?ph=7da1a58e4c" alt="EasyFines logo">
    <h1>Stáhnout <span>EasyFines</span></h1>
    <p>Vyberte si verzi aplikace pro svůj mobilní telefon:</p>
    <div class="buttons">
      <a href="https://apps.apple.com/app/apple-store/id6765952002?pt=128712125&ct=campaign&mt=8" class="btn-store btn-appstore">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <div class="btn-store-text">
          <small>Stáhnout na</small>
          <strong>App Store</strong>
        </div>
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.sagittariusinvestment.easyfines&utm_source=campaign&utm_medium=smartlink&utm_campaign=download" class="btn-store btn-googleplay">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.3.17.65.19.97.09l.05-.03 10.85-6.26-2.33-2.33-9.54 8.53zm-1.1-19.94C2.03 4.03 2 4.3 2 4.6v14.8c0 .3.03.57.09.82l9.77-9.77-9.78-6.43zm12.86 7.98l2.48-1.43-3.35-5.81-9.06-5.22c-.26-.15-.54-.22-.82-.22L13.94 11.8zM20.94 9.9l-2.5-1.44-2.78 2.78 2.78 2.78 2.52-1.46c.72-.42.72-1.25-.02-1.66z"/></svg>
        <div class="btn-store-text">
          <small>Získat na</small>
          <strong>Google Play</strong>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
